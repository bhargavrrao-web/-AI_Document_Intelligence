name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest
        # Install project dependencies from both folders
        if [ -f backend/requirements.txt ]; then pip install -r backend/requirements.txt; fi
        if [ -f frontend/requirements.txt ]; then pip install -r frontend/requirements.txt; fi

    - name: Run Pylint
      run: |
        # Check backend and frontend code for quality (ignoring common lint errors for demo)
        pylint backend/*.py frontend/*.py --disable=C,R,W0611,W0621 --exit-zero

    - name: Run Unit Tests
      run: |
        python -m unittest discover tests
