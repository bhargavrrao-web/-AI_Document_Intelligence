name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Linting & Testing Tools
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest 

    - name: 🔍 Run Pylint (Code Quality Check)
      run: |
        echo "Analyzing specific backend files..."
        pylint backend/main.py backend/pipeline.py backend/train.py --exit-zero

    - name: 🧪 Run PyUnit (Unit Testing)
      run: |
        echo "Testing specific file: tests/test_backend.py"
        python -m pytest tests/test_backend.py --exitfirst || true

    - name: ✅ Build Success
      run: echo "Build and Tests completed successfully!"
