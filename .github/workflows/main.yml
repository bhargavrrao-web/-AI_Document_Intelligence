name: MLOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint pytest pytest-cov
        pip install -r backend/requirements.txt

    - name: 🔍 Run Pylint (Backend Linting)
      run: |
        echo "Running Pylint on the backend directory..."
        pylint backend/*.py --fail-under=5.0

    - name: 🧪 Run PyUnit Tests (Unit Testing)
      run: |
        echo "Running PyUnit tests in the tests/ directory..."
        python -m pytest tests/ --doctest-modules --junitxml=junit/test-results.xml

    - name: 📊 Upload Test Results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: junit/test-results.xml
